{% extends "base.html" %}
{% block title %}Registrati – Bosco delle Kjxii{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header kingdom-card-header fw-bold text-center">
        <i class="bi bi-person-plus-fill"></i> Inizia la tua storia
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nome Avventuriero</label>
            <input type="text" name="username" class="form-control" required autofocus
                   placeholder="Il tuo nome nel Bosco"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required
                   placeholder="email@esempio.com"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Parola d'Ordine</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <div class="mb-4">
            <label class="form-label">Conferma Parola d'Ordine</label>
            <input type="password" name="confirm" class="form-control" required/>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn kingdom-btn-primary">
              <i class="bi bi-stars"></i> Crea il tuo personaggio
            </button>
          </div>
        </form>
        <hr/>
        <p class="text-center mb-0">
          Hai già un account?
          <a href="{{ url_for('auth.login') }}">Accedi</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
