{% extends "base.html" %}
{% block title %}Accedi – Bosco delle Kjxii{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header kingdom-card-header fw-bold text-center">
        <i class="bi bi-box-arrow-in-right"></i> Accedi al Bosco
      </div>
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nome Avventuriero</label>
            <input type="text" name="username" class="form-control" required autofocus/>
          </div>
          <div class="mb-3">
            <label class="form-label">Parola d'Ordine</label>
            <input type="password" name="password" class="form-control" required/>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn kingdom-btn-primary">
              <i class="bi bi-door-open"></i> Entra
            </button>
          </div>
        </form>
        <hr/>
        <p class="text-center mb-0">
          Nuovo nel Bosco?
          <a href="{{ url_for('auth.register') }}">Registrati</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
